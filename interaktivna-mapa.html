<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interaktívna mapa krojov – Anna Šenšelová</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Pinyon+Script&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F9F7F2;--ink:#1A1A1A;--red:#C41E3A;--gold:#D4AF37;--gold-dark:#A07C10;--section-alt:#F2EDE4}
body{background:var(--cream);color:var(--ink);font-family:'Cormorant Garamond',serif;font-size:18px;line-height:1.7;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(249,247,242,0.96);backdrop-filter:blur(6px);border-bottom:1px solid var(--gold);display:flex;align-items:center;justify-content:space-between;padding:0.6rem 2.5rem}
nav .logo{font-family:'Pinyon Script',cursive;font-size:2rem;color:var(--red)}
nav .back-link{font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink);text-decoration:none;transition:color 0.3s}
nav .back-link:hover{color:var(--red)}
.page-header{padding:7rem 2rem 3rem;text-align:center;background:var(--section-alt);border-bottom:1px solid rgba(212,175,55,0.3)}
.section-label{font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--red);margin-bottom:0.5rem}
h1{font-family:'Pinyon Script',cursive;font-size:clamp(2.8rem,6vw,4.5rem);color:var(--red);line-height:1.75}
.gold-line{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1rem auto}
.page-header p{font-size:1rem;color:#555;max-width:620px;margin:0 auto;font-style:italic}
.map-layout{display:grid;grid-template-columns:1fr 340px;min-height:calc(100vh - 220px)}
.map-area{padding:2.5rem;position:relative}
.map-instructions{text-align:center;margin-bottom:1.5rem}
.map-instructions p{font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-dark)}
.svg-container{position:relative;max-width:700px;margin:0 auto}
.svg-container svg{width:100%;height:auto;display:block}
.region{fill:#e8dfd0;stroke:#fff;stroke-width:1.5;cursor:crosshair;transition:fill 0.25s}
.region:hover{fill:#d4c4a8}
.pin-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--red);border:2px solid #fff;box-shadow:0 2px 8px rgba(196,30,58,0.5);cursor:pointer;transform:translate(-50%,-50%);transition:transform 0.2s;z-index:10;pointer-events:all}
.pin-dot:hover{transform:translate(-50%,-50%) scale(1.4)}
.pin-dot.has-photo{background:var(--gold)}
.pin-tooltip{position:fixed;background:#fff;border:1px solid var(--gold);border-top:2px solid var(--red);padding:0.8rem;max-width:240px;box-shadow:0 8px 28px rgba(0,0,0,0.15);pointer-events:none;z-index:200;opacity:0;transition:opacity 0.2s}
.pin-tooltip.visible{opacity:1}
.pin-tooltip img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;margin-bottom:0.6rem}
.tip-name{font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--red)}
.tip-region{font-size:0.8rem;color:#888;font-style:italic;margin-top:0.1rem}
.tip-desc{font-size:0.88rem;color:#444;margin-top:0.4rem;line-height:1.5}
.sidebar{border-left:1px solid rgba(212,175,55,0.3);background:#fff;display:flex;flex-direction:column}
.sidebar-header{padding:1.5rem;border-bottom:1px solid rgba(212,175,55,0.2)}
.sidebar-header h3{font-family:'Cinzel',serif;font-size:0.82rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--red)}
.sidebar-header p{font-size:0.88rem;color:#777;margin-top:0.3rem;font-style:italic}
.add-pin-form{padding:1.2rem 1.5rem;border-bottom:1px solid rgba(212,175,55,0.2);background:var(--section-alt)}
.add-pin-form h4{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink);margin-bottom:1rem}
.form-field{margin-bottom:0.8rem}
.form-field label{display:block;font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;color:#888;margin-bottom:0.3rem;font-family:'Cinzel',serif}
.form-field input,.form-field textarea{width:100%;padding:0.5rem 0.7rem;font-family:'Cormorant Garamond',serif;font-size:0.95rem;border:1px solid rgba(212,175,55,0.4);background:#fff;color:var(--ink);outline:none;transition:border-color 0.2s}
.form-field input:focus,.form-field textarea:focus{border-color:var(--gold)}
.form-field textarea{resize:vertical;min-height:70px}
.upload-area{border:1px dashed rgba(212,175,55,0.6);padding:1rem;text-align:center;cursor:pointer;position:relative;transition:background 0.2s}
.upload-area:hover{background:rgba(212,175,55,0.05)}
.upload-area input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:1.5rem;opacity:0.4}
.upload-area p{font-size:0.78rem;color:#aaa;margin-top:0.3rem;font-style:italic}
.preview-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:none}
.btn-add-pin{width:100%;padding:0.75rem;font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;background:transparent;color:var(--red);border:1px solid var(--red);cursor:pointer;transition:background 0.3s,color 0.3s;margin-top:0.5rem}
.btn-add-pin:hover:not(:disabled){background:var(--red);color:#fff}
.btn-add-pin:disabled{opacity:0.4;cursor:not-allowed}
.status-msg{font-size:0.78rem;text-align:center;margin-top:0.5rem;min-height:1.2em;font-style:italic}
.status-msg.placing{color:var(--red);animation:pulse 1s infinite}
.status-msg.saving{color:var(--gold-dark)}
.status-msg.success{color:#4a7c4a}
.status-msg.error{color:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.pins-list{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.pins-list h4{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:#aaa;margin-bottom:0.8rem}
.pin-item{display:flex;gap:0.8rem;padding:0.7rem 0;border-bottom:1px solid rgba(212,175,55,0.15)}
.pin-item img{width:52px;height:52px;object-fit:cover;flex-shrink:0}
.pin-placeholder{width:52px;height:52px;background:#f0ebe0;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem}
.pin-info .pin-name{font-size:0.9rem;font-weight:600;color:var(--ink)}
.pin-info .pin-region{font-size:0.78rem;color:var(--red);font-style:italic}
.pin-info .pin-desc-short{font-size:0.8rem;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.no-pins{text-align:center;padding:2rem 1rem;color:#bbb;font-style:italic;font-size:0.9rem}
body.placing-pin,body.placing-pin *{cursor:crosshair!important}
.placing-banner{display:none;position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:0.6rem 1.6rem;font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:0.12em;z-index:300;box-shadow:0 4px 18px rgba(196,30,58,0.35);white-space:nowrap}
body.placing-pin .placing-banner{display:block}
.stats-bar{display:flex;gap:2rem;justify-content:center;padding:1rem;background:#fff;border-top:1px solid rgba(212,175,55,0.2);font-family:'Cinzel',serif;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:#aaa}
.stats-bar span strong{color:var(--red)}
@media(max-width:900px){.map-layout{grid-template-columns:1fr}.sidebar{border-left:none;border-top:1px solid rgba(212,175,55,0.3)}}
</style>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyBL1YxV9LaZ2Q8Q-hbua25hkpf7dtMflaA",
    authDomain: "interaktivna-mapa-vysiviek.firebaseapp.com",
    projectId: "interaktivna-mapa-vysiviek",
    storageBucket: "interaktivna-mapa-vysiviek.firebasestorage.app",
    messagingSenderId: "544786217510",
    appId: "1:544786217510:web:176b1994aa1425cc4784e7"
  });
  const db = getFirestore(app);

  // Počúvaj zmeny v reálnom čase
  onSnapshot(collection(db, "pins"), (snapshot) => {
    window._pins = [];
    const container = document.getElementById('pinsContainer');
    if (container) container.innerHTML = '';
    snapshot.forEach(doc => {
      const pin = { id: doc.id, ...doc.data() };
      window._pins.push(pin);
      if (typeof renderPinDot === 'function') renderPinDot(pin);
    });
    if (typeof renderPinsList === 'function') renderPinsList();
    if (typeof updateStats === 'function') updateStats();
  });

  // Globálna funkcia na ukladanie pinu
  window.saveToFirebase = async function(pinData) {
    const indicator = document.getElementById('savingIndicator');
    if (indicator) indicator.style.display = 'block';
    try {
      await addDoc(collection(db, "pins"), {
        ...pinData,
        createdAt: serverTimestamp()
      });
    } catch(e) {
      alert("Chyba pri ukladaní: " + e.message);
    }
    if (indicator) indicator.style.display = 'none';
  };
</script>
