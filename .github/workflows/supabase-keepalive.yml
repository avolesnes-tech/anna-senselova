name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 9 */3 * *'   # každé 3 dni o 9:00
  workflow_dispatch:         # možnosť spustiť ručne

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://edloyrsptfwqdvgnzuhh.supabase.co/rest/v1/" \
            && echo " — Supabase je aktívny"
